  <body>
    <div id="root">
      <div id="initial-loader" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f8fafc;font-family:system-ui,-apple-system,sans-serif">
        <div style="text-align:center">
          <div style="width:48px;height:48px;border:4px solid #e2e8f0;border-top-color:#0d9488;border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 16px"></div>
          <p style="color:#475569;font-size:14px;margin:0">Duke u ngarkuar...</p>
          <style>@keyframes sp{to{transform:rotate(360deg)}}</style>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Nese app nuk ngarkohet brenda 10 sekondave, pastro SW cache VETEM 1 HERE
      setTimeout(function() {
        if (document.getElementById('initial-loader')) {
          var key = 'shkolla-cache-cleared';
          if (!sessionStorage.getItem(key)) {
            sessionStorage.setItem(key, '1');
            if ('caches' in window) {
              caches.keys().then(function(names) {
                return Promise.all(names.map(function(n) { return caches.delete(n); }));
              }).then(function() { window.location.reload(); });
            } else {
              window.location.reload();
            }
          }
        }
      }, 10000);
    </script>
