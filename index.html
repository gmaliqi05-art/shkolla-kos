  <body>
    <div id="root"></div>
    <script>
      // Shfaq gabimet ne ekran
      var _errors = [];
      window.onerror = function(msg, src, line, col, err) {
        _errors.push(msg + ' (' + src + ':' + line + ')');
        showErrors();
      };
      window.addEventListener('unhandledrejection', function(e) {
        _errors.push('Promise: ' + (e.reason && e.reason.message || e.reason || 'unknown'));
        showErrors();
      });
      function showErrors() {
        var el = document.getElementById('error-display');
        if (!el) {
          el = document.createElement('div');
          el.id = 'error-display';
          el.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#fef2f2;border-top:2px solid #ef4444;padding:12px;font-family:monospace;font-size:12px;color:#991b1b;max-height:200px;overflow:auto;z-index:99999';
          document.body.appendChild(el);
        }
        el.innerHTML = '<b>Gabime:</b><br>' + _errors.join('<br>');
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
